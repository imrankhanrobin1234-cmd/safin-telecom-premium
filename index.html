<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safin Telecom Premium</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#0d0d0d;
    color:white;
}

.hero{
    width:100%;
    height:300px;
    object-fit:cover;
    display:block;
}

.wrap{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:#161616;
    border:2px solid #d4af37;
    border-radius:20px;
    padding:25px;
    margin-bottom:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(212,175,55,.25);
}

.logo{
    width:180px;
    border-radius:15px;
    margin-bottom:15px;
}

h1{
    color:#d4af37;
    margin-bottom:10px;
}

.subtitle{
    color:#ccc;
    font-size:17px;
}

.badge{
    display:inline-block;
    background:#d4af37;
    color:#000;
    padding:8px 16px;
    border-radius:30px;
    margin-top:15px;
    font-weight:bold;
}

.btn{
    display:block;
    text-decoration:none;
    color:white;
    padding:15px;
    margin:12px 0;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    opacity:.9;
}

.fb{
    background:#1877f2;
}

.wa{
    background:#25D366;
}

.tk{
    background:#000;
    border:1px solid #444;
}

.call{
    background:#ff6b00;
}

.map{
    background:#d4af37;
    color:#000;
}

footer{
    text-align:center;
    color:#888;
    padding:25px;
    font-size:14px;
}

/* Floating WhatsApp Button */
.float{
    position:fixed;
    width:60px;
    height:60px;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    border-radius:50%;
    text-align:center;
    font-size:30px;
    line-height:60px;
    text-decoration:none;
    box-shadow:0 0 15px rgba(0,0,0,.5);
    z-index:999;
}
</style>
</head>

<body>

<img src="20260618_031824564.jpeg" class="hero" alt="Safin Telecom Shop">
<div class="wrap">

    <div class="card">

        <img src="Messenger_creation_75EEBE59-6916-4586-952E-95591A0400FE.jpeg" class="logo" alt="Safin Telecom Logo">
        <h1>Safin Telecom Premium</h1>

        <p class="subtitle">
            Mobile Buy • Sell • Exchange
        </p>

        <div class="badge">
            ✔ Trusted Mobile Shop Bogura
        </div>

    </div>

    <div class="card">

        <a class="btn fb"
        href="https://www.facebook.com/share/1MhLj99LFJ/"
        target="_blank">
        📘 Facebook Page
        </a>

        <a class="btn wa"
        href="https://wa.me/8801732468639"
        target="_blank">
        💬 WhatsApp Chat
        </a>

        <a class="btn tk"
        href="https://www.tiktok.com/@safintelecom1"
        target="_blank">
        🎵 TikTok Profile
        </a>

        <a class="btn call"
        href="tel:+8801732468639">
        📞 Call Now
        </a>

        <a class="btn map"
        href="https://maps.app.goo.gl/3yw2mboxtoC2BySBA"
        target="_blank">
        📍 Google Maps Location
        </a>

    </div>

</div>

<footer>
    © 2026 Safin Telecom Premium<br>
    Bogura Sadar, Bogura
</footer>

<a class="float"
href="https://wa.me/8801732468639"
target="_blank">
💬
</a>

</body>
</html>
